name: Test Package Builds

on:
  # Manual trigger for testing packages
  workflow_dispatch:
    inputs:
      test_windows:
        description: 'Test Windows build?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      test_macos:
        description: 'Test macOS build?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

  # Trigger on pull requests that affect packaging
  pull_request:
    paths:
      - 'kumihan_formatter/**'
      - 'tools/packaging/kumihan_formatter.spec'
      - 'tools/packaging/kumihan_formatter_macos.spec'
      - '.github/workflows/build-*.yml'

jobs:
  test-windows-build:
    if: ${{ github.event.inputs.test_windows == 'true' || github.event_name == 'pull_request' }}
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pyinstaller

    - name: Test Windows build script
      run: |
        Write-Host "[INFO] Windows build scripts have been removed as part of GUI script cleanup"
        Write-Host "[INFO] Skipping Windows build test - no GUI packaging available"
        exit 0

    - name: Verify Windows package
      run: |
        Write-Host "[INFO] Windows packaging verification skipped - GUI scripts removed"
        Write-Host "[OK] Test passed (no verification needed)"

    - name: Upload Windows test artifacts
      run: |
        Write-Host "[INFO] No Windows artifacts to upload - GUI packaging disabled"

  test-macos-build:
    if: ${{ github.event.inputs.test_macos == 'true' || github.event_name == 'pull_request' }}
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pyinstaller

    - name: Test macOS build script
      run: |
        echo "[INFO] macOS build scripts have been removed as part of GUI script cleanup"
        echo "[INFO] Skipping macOS build test - no GUI packaging available"
        exit 0

    - name: Verify macOS package
      run: |
        echo "[INFO] macOS packaging verification skipped - GUI scripts removed"
        echo "[OK] Test passed (no verification needed)"

    - name: Upload macOS test artifacts
      run: |
        echo "[INFO] No macOS artifacts to upload - GUI packaging disabled"

  test-summary:
    needs: [test-windows-build, test-macos-build]
    runs-on: ubuntu-latest
    if: always()

    steps:
    - name: Test Summary
      run: |
        echo "## Package Build Test Summary"
        echo ""
        echo "### Test Results:"

        if [ "${{ needs.test-windows-build.result }}" == "success" ]; then
          echo "- [OK] **Windows Build**: PASSED"
        elif [ "${{ needs.test-windows-build.result }}" == "skipped" ]; then
          echo "- [SKIP] **Windows Build**: SKIPPED"
        else
          echo "- [ERROR] **Windows Build**: FAILED"
        fi

        if [ "${{ needs.test-macos-build.result }}" == "success" ]; then
          echo "- [OK] **macOS Build**: PASSED"
        elif [ "${{ needs.test-macos-build.result }}" == "skipped" ]; then
          echo "- [SKIP] **macOS Build**: SKIPPED"
        else
          echo "- [ERROR] **macOS Build**: FAILED"
        fi

        echo ""
        echo "### Artifacts:"
        echo "- Windows executable and package (if tested)"
        echo "- macOS app bundle and package (if tested)"
        echo ""
        echo "### Next Steps:"
        echo "1. Download artifacts to test manually"
        echo "2. Verify functionality on target platforms"
        echo "3. Report any issues found"

        # Set overall status
        windows_ok="${{ needs.test-windows-build.result == 'success' || needs.test-windows-build.result == 'skipped' }}"
        macos_ok="${{ needs.test-macos-build.result == 'success' || needs.test-macos-build.result == 'skipped' }}"

        if [ "$windows_ok" == "true" ] && [ "$macos_ok" == "true" ]; then
          echo ""
          echo "[OK] **Overall Status: PASSED**"
          exit 0
        else
          echo ""
          echo "[ERROR] **Overall Status: FAILED**"
          exit 1
        fi
